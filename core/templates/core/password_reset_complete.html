{% extends 'core/base.html' %}
{% block title %}Password Updated | DocSeva{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-12 animate-slide-up">
  <div class="card-3d p-8 md:p-12 text-center">
    <div class="h-20 w-20 rounded-[2rem] bg-emerald-50 text-emerald-600 flex items-center justify-center mx-auto mb-8 shadow-xl shadow-emerald-50 border-4 border-white">
      <i data-lucide="check-circle-2" class="w-10 h-10"></i>
    </div>
    <h1 class="text-3xl font-black text-slate-900 tracking-tight mb-4">Access Restored</h1>
    <p class="text-slate-500 leading-relaxed mb-10">
      Your password has been successfully updated. Your secure vault is now ready for access with your new credentials.
    </p>
    
    <a href="{% url 'login' %}" class="btn-modern btn-primary w-full py-4 text-lg shadow-xl shadow-blue-100">
      Sign In Now <i data-lucide="log-in" class="w-5 h-5 ml-2"></i>
    </a>
  </div>
</div>
{% endblock %}
