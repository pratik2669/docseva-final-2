{% extends "core/base.html" %}
{% block title %}400 Bad Request | DocSeva{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center text-center animate-slide-up">
  <div class="h-32 w-32 rounded-[2.5rem] bg-amber-50 text-amber-500 flex items-center justify-center mb-8 shadow-xl shadow-amber-50 border-4 border-white">
    <i data-lucide="alert-circle" class="w-16 h-16"></i>
  </div>
  <h1 class="text-6xl font-black text-slate-900 mb-4 tracking-tighter">400</h1>
  <h2 class="text-2xl font-bold text-slate-700 mb-4">Bad Request</h2>
  <p class="text-slate-500 max-w-md mx-auto mb-10 leading-relaxed">
    The request could not be understood by our server. Please ensure you're using a valid link and try again.
  </p>
  <a href="{% url 'landing' %}" class="btn-modern btn-primary px-10 py-4 shadow-xl shadow-blue-100">
    Return Home <i data-lucide="home" class="w-5 h-5 ml-2"></i>
  </a>
</div>
{% endblock %}
